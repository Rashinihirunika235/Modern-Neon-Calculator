<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Neon Calculator</title>
    <style>
        /* Modern Background with Gradient */
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* Glassmorphism Container */
        .calc-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 30px;
            width: 320px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* Advanced Glass Display */
        .display-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: right;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #history {
            color: #94a3b8;
            font-size: 0.9rem;
            min-height: 1.2rem;
            margin-bottom: 5px;
        }

        #result {
            color: #00f2fe; /* Neon Cyan */
            font-size: 2.5rem;
            font-weight: 600;
            overflow: hidden;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        /* Grid for Buttons */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* Premium Button Styles */
        button {
            border: none;
            height: 60px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Specific Color Logic */
        .btn-operator {
            color: #f472b6; /* Soft Pink */
        }

        .btn-special {
            color: #fbbf24; /* Amber */
        }

        .btn-clear {
            background: rgba(239, 68, 68, 0.15) !important;
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-clear:hover {
            background: rgba(239, 68, 68, 0.3) !important;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        /* Neon Equal Button */
        .btn-equal {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%) !important;
            color: #000;
            font-weight: 700;
            grid-column: span 2;
        }

        .btn-equal:hover {
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.6);
        }
    </style>
</head>
<body>

    <div class="calc-card">
        <div class="display-container">
            <div id="history"></div>
            <div id="result">0</div>
        </div>

        <div class="buttons-grid">
            <button class="btn-clear" onclick="clearAll()">AC</button>
            <button class="btn-special" onclick="deleteLast()">DEL</button>
            <button class="btn-operator" onclick="append('%')">%</button>
            <button class="btn-operator" onclick="append('/')">÷</button>
            
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="btn-operator" onclick="append('*')">×</button>
            
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="btn-operator" onclick="append('-')">-</button>
            
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button class="btn-operator" onclick="append('+')">+</button>
            
            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button class="btn-equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let resultDisplay = document.getElementById('result');
        let historyDisplay = document.getElementById('history');
        let currentInput = "";

        function append(value) {
            if (resultDisplay.innerText === "0" && value !== ".") {
                currentInput = value;
            } else {
                currentInput += value;
            }
            updateDisplay();
        }

        function clearAll() {
            currentInput = "";
            historyDisplay.innerText = "";
            resultDisplay.innerText = "0";
        }

        function deleteLast() {
            currentInput = currentInput.slice(0, -1);
            updateDisplay();
        }

        function updateDisplay() {
            resultDisplay.innerText = currentInput || "0";
        }

        function calculate() {
            try {
                // Formatting the expression for JavaScript eval
                let expression = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
                
                // Saving history
                historyDisplay.innerText = currentInput + " =";
                
                // Calculating
                let result = eval(expression);
                
                // Cleaning up result (handling long decimals)
                if (!Number.isInteger(result)) {
                    result = result.toFixed(4).replace(/\.?0+$/, "");
                }
                
                currentInput = result.toString();
                resultDisplay.innerText = currentInput;
            } catch (error) {
                resultDisplay.innerText = "Error";
                currentInput = "";
            }
        }
    </script>
</body>
</html>
